services:
  - type: web
    name: pantas-priok
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: pantas-appeals
      - key: BOOTSTRAP_ADMIN_USERNAME
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        sync: false
      - key: EMAIL_PROVIDER
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_API_URL
        value: https://api.brevo.com/v3/smtp/email
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_TLS_MODE
        value: starttls
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_API_URL
        value: https://api.resend.com/emails
      - key: PHONE_PROVIDER
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY
        sync: false
      - key: TWILIO_API_SECRET
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TWILIO_API_BASE_URL
        value: https://api.twilio.com/2010-04-01
      - key: PHONE_OTP_WEBHOOK_URL
        sync: false
      - key: PHONE_OTP_WEBHOOK_TOKEN
        sync: false
      - key: TRUST_PROXY
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_TTL
        value: 12h
      - key: SESSION_IDLE_TTL
        value: 30m
      - key: MAX_EXCEL_BYTES
        value: "20971520"
      - key: MAX_DOCUMENT_BYTES
        value: "5242880"
